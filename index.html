<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GOD TRICK V5 | OFFICIAL SUCCESS</title>
                <style>
                        :root { --gold: #ffd700; --dark: #050505; --green: #00ff00; }
                                body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
                                        .card { width: 360px; padding: 25px; background: #111; border: 2px solid var(--gold); border-radius: 15px; box-shadow: 0 0 50px rgba(255, 213, 0, 0.2); text-align: center; }
                                                h1 { color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 26px; text-shadow: 0 0 15px var(--gold); }
                                                        .subtitle { font-size: 10px; color: #888; margin: 10px 0 20px; letter-spacing: 2px; }
                                                                input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 5px; text-align: center; font-weight: bold; outline: none; }
                                                                        button { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
                                                                                .console { background: #000; border: 1px solid #222; height: 120px; margin-top: 20px; font-size: 11px; padding: 10px; text-align: left; overflow-y: auto; color: var(--green); border-left: 4px solid var(--gold); }
                                                                                        .hidden { display: none; }
                                                                                            </style>
                                                                                            </head>
                                                                                            <body>

                                                                                                <div id="login-screen" class="card">
                                                                                                        <h1>GOD TRICK V5</h1>
                                                                                                                <div class="subtitle">AUTENTICAÇÃO DE VENDEDOR</div>
                                                                                                                        <input type="text" id="user" placeholder="LOGIN">
                                                                                                                                <input type="password" id="pass" placeholder="SENHA">
                                                                                                                                        <button onclick="login()">ENTRAR</button>
                                                                                                                                            </div>

                                                                                                                                                <div id="main-screen" class="card hidden">
                                                                                                                                                        <h1>GOD TRICK V5</h1>
                                                                                                                                                                <div class="subtitle">SISTEMA ANTI-ERRO RSA</div>
                                                                                                                                                                        <div style="font-size: 11px; text-align: left; margin-bottom: 10px;">
                                                                                                                                                                                    STATUS: <span id="status-display" style="color:red">AGUARDANDO CABO</span>
                                                                                                                                                                                            </div>
                                                                                                                                                                                                    <button onclick="conectarV5()" style="background: #fff;">1. AUTORIZAR NO CELULAR</button>
                                                                                                                                                                                                            <button id="btn-inject" onclick="injetarV5()" disabled>2. ATIVAR MAGNETISMO</button>
                                                                                                                                                                                                                    <div class="console" id="log">$ Conecte o cabo e clique em Autorizar.</div>
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                    const AUTH = { user: "god", pass: "trick" };
                                                                                                                                                                                                                                            let device;

                                                                                                                                                                                                                                                    function print(msg, color = "#00ff00") {
                                                                                                                                                                                                                                                                    document.getElementById('log').innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
                                                                                                                                                                                                                                                                                document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                            function login() {
                                                                                                                                                                                                                                                                            if (document.getElementById('user').value === AUTH.user && document.getElementById('pass').value === AUTH.pass) {
                                                                                                                                                                                                                                                                                                document.getElementById('login-screen').classList.add('hidden');
                                                                                                                                                                                                                                                                                                                document.getElementById('main-screen').classList.remove('hidden');
                                                                                                                                                                                                                                                                            } else { alert("Login Inválido"); }
                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                    async function conectarV5() {
                                                                                                                                                                                                                                                                                    print("Iniciando Forçador RSA V5.2...");
                                                                                                                                                                                                                                                                                        try {
                                                                                                                                                                                                                                                                                                    device = await navigator.usb.requestDevice({ filters: [] });
                                                                                                                                                                                                                                                                                                            await device.open();
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                            // Reset de hardware para limpar o "Connection Refused"
                                                                                                                                                                                                                                                                                                                                    await device.reset();
                                                                                                                                                                                                                                                                                                                                            await device.selectConfiguration(1);
                                                                                                                                                                                                                                                                                                                                                    await device.claimInterface(0);
                                                                                                                                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                                                                                                                            print("Interface Clamada! Enviando pulsos...", "#ffd700");
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                    // Loop de 3 tentativas para forçar o Pop-up a aparecer
                                                                                                                                                                                                                                                                                                                                                                            for(let i=0; i<3; i++) {
                                                                                                                                                                                                                                                                                                                                                                                            const msg = new Uint8Array([0x43, 0x4e, 0x4e, 0x58, 0x00, 0x00, 0x00, 0x01, 0x00, 0x10, 0x00, 0x00]);
                                                                                                                                                                                                                                                                                                                                                                                            await device.transferOut(1, msg.buffer);
                                                                                                                                                                                                                                                                                                                                                                                            print("Tentativa " + (i+1) + " enviada...");
                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                            print("VERIFIQUE A TELA DO SEU CELULAR AGORA!", "white");
                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('status-display').innerText = "AGUARDANDO RSA";
                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('status-display').style.color = "gold";
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                        } catch (err) {
                                                                                                                                                                                                                                                                                                    print("ERRO: " + err.message, "red");
                                                                                                                                                                                                                                                                                                    if(err.message.includes("claimInterface")) {
                                                                                                                                                                                                                                                                                                                    print("SOLUÇÃO: Reinicie o celular e troque o cabo.", "#888");
                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                            function injetarV5() {
                                                                                                                                                                                                                                                                                            print("Injetando Painel God Trick V5...");
                                                                                                                                                                                                                                                                                                        print("Aimlock Neck: 100% Ativo", "#ffd700");
                                                                                                                                                                                                                                                                                                                    print("FPS: 120Hz Otimizado", "#ffd700");
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                </html>
