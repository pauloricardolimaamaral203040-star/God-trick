<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD TRICK V3 | ULTRA PREMIUM</title>
    <style>
        :root { --gold: #ffd700; --dark: #050505; --accent: #111; --green: #00ff00; --red: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 360px; padding: 25px; background: var(--accent); border: 2px solid var(--gold); border-radius: 15px; box-shadow: 0 0 50px rgba(255, 213, 0, 0.2); text-align: center; }
        h1 { color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 26px; text-shadow: 0 0 15px var(--gold); }
        .v2-tag { background: var(--gold); color: black; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; vertical-align: middle; }
        .subtitle { font-size: 10px; color: #888; margin: 10px 0 20px; letter-spacing: 2px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 5px; text-align: center; font-weight: bold; outline: none; }
        button { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .console { background: #000; border: 1px solid #222; height: 120px; margin-top: 20px; font-size: 11px; padding: 10px; text-align: left; overflow-y: auto; color: var(--green); border-left: 4px solid var(--gold); }
        .hidden { display: none; }
        #status-display { color: var(--red); font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--accent); border: 2px solid var(--gold); border-radius: 10px; padding: 20px; width: 300px; text-align: center; }
        .modal-content h2 { color: var(--gold); margin-top: 0; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <div id="login-screen" class="card">
        <h1>GOD TRICK <span class="v2-tag">V3</span></h1>
        <div class="subtitle">SISTEMA DE INJEÇÃO REAL</div>
        <input type="text" id="user" placeholder="LOGIN">
        <input type="password" id="pass" placeholder="SENHA">
        <button onclick="login()">DESBLOQUEAR ACESSO</button>
    </div>

    <div id="main-screen" class="card hidden">
        <h1>GOD TRICK <span class="v2-tag">V3</span></h1>
        <div class="subtitle">PAINEL USB V3 AUTÊNTICO</div>
        <div style="font-size: 11px; text-align: left; margin-bottom: 10px;">
            STATUS: <span id="status-display">DESCONECTADO</span><br>
            TARGET: <span style="color:var(--gold)">PESCOÇO (LOCK)</span><br>
            FOV: <span style="color:var(--gold)">40</span>
        </div>
        <button id="btn-connect" onclick="conectarRealUSB()">AUTORIZAR USB</button>
        <button id="btn-inject" onclick="mostrarConfirmacao()" disabled>INJETAR V3</button>
        <div id="log" class="console"></div>
    </div>

    <div id="confirmation-modal" class="modal">
        <div class="modal-content">
            <h2>CONFIRMAR INJEÇÃO?</h2>
            <p style="color: #ccc; font-size: 12px;">Tem certeza que deseja injetar o V3 agora?</p>
            <div class="modal-buttons">
                <button onclick="cancelarInjecao()" style="background: #444; color: #ccc;">CANCELAR</button>
                <button onclick="confirmarInjecao()">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script>
        const AUTH = { user: "god", pass: "trick" };
        let deviceConnected = false;

        function print(msg, color = "#00ff00") {
            const t = new Date().toLocaleTimeString();
            document.getElementById('log').innerHTML += `<br><span style="color:${color}">[${t}] ${msg}</span>`;
            document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
        }

        function setupUSB() {
            const button = document.getElementById('btn-connect');
            if (!('usb' in navigator)) {
                button.disabled = true;
                print("WebUSB não disponível neste navegador. Use Chrome/Edge em HTTPS ou experimente no desktop.", "var(--red)");
                document.getElementById('status-display').innerText = "USB NÃO SUPORTADO";
                return;
            }

            print("WebUSB detectado. Clique em AUTORIZAR USB para pedir permissão ao dispositivo.", "#ffd700");
        }

        function login() {
            if (document.getElementById('user').value === AUTH.user && document.getElementById('pass').value === AUTH.pass) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                setupUSB();
            } else {
                alert("ACESSO NEGADO!");
            }
        }

        async function conectarRealUSB() {
            if (!('usb' in navigator)) {
                print("WebUSB não disponível. Não é possível abrir o prompt de autorização.", "var(--red)");
                return;
            }

            print("Solicitando acesso ao hardware USB...");
            try {
                const device = await navigator.usb.requestDevice({ filters: [], acceptAllDevices: true });
                await device.open();
                deviceConnected = true;
                document.getElementById('status-display').innerText = "CONECTADO: " + device.productName;
                document.getElementById('status-display').style.color = "var(--green)";
                document.getElementById('btn-inject').disabled = false;
                print("Dispositivo " + device.productName + " autorizado!", "#ffd700");
                print("Permissão USB concedida. Aguarde o prompt do sistema no seu telefone.", "#ffd700");
            } catch (err) {
                print("ERRO: Falha na conexão USB. Verifique o navegador e o cabo.", "var(--red)");
                deviceConnected = false;
            }
        }

        function injetarV2() {
            if (!deviceConnected) return;
            print("Iniciando Protocolo V2...");
            print("Verificando conexão USB real e FOV 40...");
            setTimeout(() => {
                print("Lógica 'com.auxilio.j7' injetada no Pescoço.", "#ffd700");
                print("FOV: 40 fixado com Aimlock premium.", "#ffd700");
                print("FPS desbloqueado (Sync 120Hz).", "#ffd700");
                setTimeout(() => {
                    print("---------------------------------");
                    print("GOD TRICK V3 ATIVO COM SUCESSO!", "#ffd700");
                }, 1500);
            }, 1000);
        }

        function mostrarConfirmacao() {
            if (!deviceConnected) return;
            document.getElementById('confirmation-modal').classList.add('active');
        }

        function confirmarInjecao() {
            document.getElementById('confirmation-modal').classList.remove('active');
            injetarV2();
        }

        function cancelarInjecao() {
            document.getElementById('confirmation-modal').classList.remove('active');
            print("Injeção cancelada pelo usuário.", "#ff9900");
        }
    </script>
</body>
</html>
